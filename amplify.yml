version: 1
frontend:
  phases:
    preBuild:
      commands:
        - PRISMA_HIDE_UPDATE_MESSAGE=true npm ci --cache .npm --prefer-offline
    build:
      commands:
        - touch .env.production
        - env | grep -E '^(DATABASE_URL|DATABASE_AUTH_MODE|RDS_HOST|RDS_PORT|RDS_DATABASE|RDS_USER|RDS_REGION|RDS_AWS_ACCESS_KEY_ID|RDS_AWS_SECRET_ACCESS_KEY|NEXTAUTH_URL|NEXTAUTH_SECRET|SMTP_HOST|SMTP_PORT|SMTP_USER|SMTP_PASS|SMTP_FROM|LEADS_NOTIFY_TO|DEALER_NAME|DEALER_ID|DEALER_PHONE|DEALER_EMAIL|DEALER_ADDRESS|DEALER_WEBSITE|AUTOTRADER_SFTP_HOST|AUTOTRADER_SFTP_PORT|AUTOTRADER_SFTP_USER|AUTOTRADER_SFTP_PASS|AUTOTRADER_SFTP_PATH|AUTOTRADER_DEALER_ID|CARGURUS_SFTP_HOST|CARGURUS_SFTP_PORT|CARGURUS_SFTP_USER|CARGURUS_SFTP_PASS|CARGURUS_SFTP_PATH|CARGURUS_DEALER_ID|SYNDICATION_CRON|UPLOADS_S3_BUCKET|UPLOADS_S3_REGION|UPLOADS_S3_PREFIX|UPLOADS_PUBLIC_BASE_URL)=' >> .env.production || true
        - |
          if [ -n "$DATABASE_URL" ] || [ "$DATABASE_AUTH_MODE" = "iam" ]; then
            echo "Running database migrations (connect_timeout=120s to allow Aurora cold-start)..."
            PRISMA_HIDE_UPDATE_MESSAGE=true DATABASE_CONNECT_TIMEOUT=120 npm run db:migrate \
              && echo "Migrations completed." \
              || echo "WARNING: Migrations failed (Aurora may be paused or unreachable). Build will continue; run migrations manually if the schema changed."
          else
            echo "Database not configured; skipping Prisma migrations"
          fi
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - .npm/**/*
      - .next/cache/**/*
